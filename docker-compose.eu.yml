# ============================================================
# Livora Platform — EU Region Override
# Usage: docker compose -f docker-compose.yml -f docker-compose.eu.yml up -d
# ============================================================
# This override configures the EU (primary) region:
# - Sets MEDIASOUP_LOCAL_REGION=eu on backend
# - Configures EU-specific mediasoup nodes with @eu region tags
# - Deploys regional TURN server (coturn-eu)
# - Deploys regional Redis for EU state
# ============================================================

services:
  livora-backend:
    environment:
      MEDIASOUP_LOCAL_REGION: eu
      MEDIASOUP_NODES: >-
        eu-ms-1@eu:http://eu-ms-1:4000,
        eu-ms-2@eu:http://eu-ms-2:4001,
        eu-ms-3@eu:http://eu-ms-3:4002
      MEDIASOUP_ANNOUNCED_IP: ${EU_PUBLIC_IP}
      TURN_SERVER_URL: "turn:turn-eu.${DOMAIN:-joinlivora.com}:3478"

  # ── EU Mediasoup Nodes ──
  eu-ms-1:
    image: ${MEDIASOUP_IMAGE:-livora-mediasoup}
    build: ./services/mediasoup-server
    container_name: eu-ms-1
    restart: always
    environment:
      MEDIASOUP_NODE_ID: eu-ms-1
      MEDIASOUP_REGION: eu
      MEDIASOUP_PORT: 4000
      MEDIASOUP_INTERNAL_SECRET: ${MEDIASOUP_AUTH_TOKEN}
      MEDIASOUP_LISTEN_IP: "0.0.0.0"
      MEDIASOUP_ANNOUNCED_IP: ${EU_PUBLIC_IP}
      RTC_MIN_PORT: "40000"
      RTC_MAX_PORT: "40100"
      TURN_SERVER_URL: "turn:turn-eu.${DOMAIN:-joinlivora.com}:3478"
      TURN_USERNAME: ${TURN_USERNAME:-}
      TURN_CREDENTIAL: ${TURN_CREDENTIAL:-}
    ports:
      - "40000-40100:40000-40100/udp"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4000/health', r => { process.exit(r.statusCode === 200 ? 0 : 1) }).on('error', () => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '2.0'
    networks:
      - livora-network

  eu-ms-2:
    image: ${MEDIASOUP_IMAGE:-livora-mediasoup}
    build: ./services/mediasoup-server
    container_name: eu-ms-2
    restart: always
    environment:
      MEDIASOUP_NODE_ID: eu-ms-2
      MEDIASOUP_REGION: eu
      MEDIASOUP_PORT: 4001
      MEDIASOUP_INTERNAL_SECRET: ${MEDIASOUP_AUTH_TOKEN}
      MEDIASOUP_LISTEN_IP: "0.0.0.0"
      MEDIASOUP_ANNOUNCED_IP: ${EU_PUBLIC_IP}
      RTC_MIN_PORT: "40101"
      RTC_MAX_PORT: "40200"
      TURN_SERVER_URL: "turn:turn-eu.${DOMAIN:-joinlivora.com}:3478"
      TURN_USERNAME: ${TURN_USERNAME:-}
      TURN_CREDENTIAL: ${TURN_CREDENTIAL:-}
    ports:
      - "40101-40200:40101-40200/udp"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4001/health', r => { process.exit(r.statusCode === 200 ? 0 : 1) }).on('error', () => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '2.0'
    networks:
      - livora-network

  eu-ms-3:
    image: ${MEDIASOUP_IMAGE:-livora-mediasoup}
    build: ./services/mediasoup-server
    container_name: eu-ms-3
    restart: always
    environment:
      MEDIASOUP_NODE_ID: eu-ms-3
      MEDIASOUP_REGION: eu
      MEDIASOUP_PORT: 4002
      MEDIASOUP_INTERNAL_SECRET: ${MEDIASOUP_AUTH_TOKEN}
      MEDIASOUP_LISTEN_IP: "0.0.0.0"
      MEDIASOUP_ANNOUNCED_IP: ${EU_PUBLIC_IP}
      RTC_MIN_PORT: "40201"
      RTC_MAX_PORT: "40300"
      TURN_SERVER_URL: "turn:turn-eu.${DOMAIN:-joinlivora.com}:3478"
      TURN_USERNAME: ${TURN_USERNAME:-}
      TURN_CREDENTIAL: ${TURN_CREDENTIAL:-}
    ports:
      - "40201-40300:40201-40300/udp"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4002/health', r => { process.exit(r.statusCode === 200 ? 0 : 1) }).on('error', () => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '2.0'
    networks:
      - livora-network

  # ── EU TURN Server ──
  coturn-eu:
    image: coturn/coturn:latest
    container_name: coturn-eu
    restart: unless-stopped
    network_mode: "host"
    command: >
      turnserver
      --log-file=stdout
      --min-port=49152
      --max-port=49200
      --fingerprint
      --lt-cred-mech
      --realm=${TURN_REALM:-joinlivora.com}
      --user=${TURN_USERNAME:-turnuser}:${TURN_CREDENTIAL:-turnpassword}
      --external-ip=${EU_PUBLIC_IP}
      --listening-port=3478
      --no-cli
    deploy:
      resources:
        limits:
          memory: 256M

  # ── EU Regional Redis ──
  redis-eu:
    image: redis:7-alpine
    container_name: redis-eu
    restart: always
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    volumes:
      - redis_eu_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $${REDIS_PASSWORD} ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - livora-network

  # ── EU Transcode Worker ────────────────────────────────────────────────────
  transcode-worker:
    environment:
      # EU region identity — embedded in heartbeat values and logs
      TRANSCODE_REGION: eu
      # Redis: use EU regional Redis for low-latency state
      REDIS_HOST: redis-eu
      # S3 / R2 storage: set TRANSCODE_S3_ENABLED=true and provide credentials
      # to enable multi-region HLS delivery from shared object storage.
      # Leave disabled to keep HLS on the local streams_data volume (single-region).
      TRANSCODE_S3_ENABLED: ${TRANSCODE_S3_ENABLED:-false}
      TRANSCODE_S3_BUCKET: ${TRANSCODE_S3_BUCKET:-livora-hls}
      TRANSCODE_S3_ENDPOINT: ${TRANSCODE_S3_ENDPOINT:-}
      TRANSCODE_S3_REGION: ${TRANSCODE_S3_REGION:-auto}
      TRANSCODE_S3_ACCESS_KEY_ID: ${TRANSCODE_S3_ACCESS_KEY_ID:-}
      TRANSCODE_S3_SECRET_ACCESS_KEY: ${TRANSCODE_S3_SECRET_ACCESS_KEY:-}
    volumes:
      - streams_eu_data:/streams
    depends_on:
      redis-eu:
        condition: service_healthy
    networks:
      - livora-network

volumes:
  redis_eu_data:
  streams_eu_data:
