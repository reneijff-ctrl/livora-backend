# ============================================================
# API Backend — api.joinlivora.com
# TLS termination + WebSocket proxy + security headers
# ============================================================

# --- Rate limiting zones (shared memory) ---
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;
limit_req_zone $binary_remote_addr zone=upload:10m rate=2r/s;

# --- Upstream ---
upstream backend {
    server livora-backend:8080;
    keepalive 32;
}

# --- HTTP → HTTPS redirect ---
server {
    listen 80;
    server_name api.joinlivora.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# --- HTTPS server ---
server {
    listen 443 ssl http2;
    server_name api.joinlivora.com;

    # --- TLS ---
    ssl_certificate /etc/letsencrypt/live/api.joinlivora.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.joinlivora.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305';
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;

    # --- Security headers ---
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # --- Request size limit (file uploads) ---
    client_max_body_size 10m;

    # --- Common proxy headers ---
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # --- WebSocket (STOMP over SockJS) ---
    location /ws {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # --- Auth endpoints (strict rate limit) ---
    location /api/auth/ {
        limit_req zone=auth burst=10 nodelay;
        proxy_pass http://backend;
    }

    # --- File upload endpoints (strict rate limit) ---
    location /api/creator/profile/upload {
        limit_req zone=upload burst=5 nodelay;
        proxy_pass http://backend;
    }

    # --- API (general rate limit) ---
    location /api/ {
        limit_req zone=api burst=50 nodelay;
        proxy_pass http://backend;
    }

    # --- Stripe webhooks ---
    location /webhooks/ {
        proxy_pass http://backend;
    }

    # --- Health check (public) ---
    location /actuator/health {
        proxy_pass http://backend;
    }

    # --- Block all other actuator endpoints ---
    location /actuator/ {
        deny all;
    }

    # --- HLS streaming ---
    location /hls/ {
        proxy_pass http://backend;
    }
}
