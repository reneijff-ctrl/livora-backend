# ============================================================
# API Backend — api.joinlivora.com
# TLS termination + WebSocket proxy + HLS direct serving
#
# CDN ARCHITECTURE:
#   cdn.joinlivora.com  → Cloudflare (edge cache + WAF)
#   api.joinlivora.com  → this Nginx origin (internal-only in prod)
#
# In production, all traffic arrives through Cloudflare.
# real_ip_header extracts the real client IP from CF-Connecting-IP.
# Requests without a CF-Ray header are blocked at origin (Step 7).
# ============================================================

# --- Cloudflare IP ranges (IPv4) — real client IP extraction ---
# Source: https://www.cloudflare.com/ips-v4  (updated 2024)
set_real_ip_from 173.245.48.0/20;
set_real_ip_from 103.21.244.0/22;
set_real_ip_from 103.22.200.0/22;
set_real_ip_from 103.31.4.0/22;
set_real_ip_from 141.101.64.0/18;
set_real_ip_from 108.162.192.0/18;
set_real_ip_from 190.93.240.0/20;
set_real_ip_from 188.114.96.0/20;
set_real_ip_from 197.234.240.0/22;
set_real_ip_from 198.41.128.0/17;
set_real_ip_from 162.158.0.0/15;
set_real_ip_from 104.16.0.0/13;
set_real_ip_from 104.24.0.0/14;
set_real_ip_from 172.64.0.0/13;
set_real_ip_from 131.0.72.0/22;

# --- Cloudflare IP ranges (IPv6) ---
set_real_ip_from 2400:cb00::/32;
set_real_ip_from 2606:4700::/32;
set_real_ip_from 2803:f800::/32;
set_real_ip_from 2405:b500::/32;
set_real_ip_from 2405:8100::/32;
set_real_ip_from 2a06:98c0::/29;
set_real_ip_from 2c0f:f248::/32;

# Use real client IP from Cloudflare header, not proxy IP
real_ip_header CF-Connecting-IP;

# --- Rate limiting zones (shared memory) ---
# All limits are the origin-protection tier — Cloudflare WAF handles edge limiting.
limit_req_zone $binary_remote_addr zone=api:10m   rate=30r/s;
limit_req_zone $binary_remote_addr zone=auth:10m  rate=5r/s;
limit_req_zone $binary_remote_addr zone=upload:10m rate=2r/s;
# HLS origin: Cloudflare absorbs ~97% of requests; origin only sees cache misses.
# 200r/s per real client IP is still generous — a single viewer never sends >2r/s.
limit_req_zone $binary_remote_addr zone=hls:10m   rate=200r/s;

# --- CDN origin protection ---
# PRODUCTION: set $cf_protection_enabled 1;
# DEVELOPMENT: set $cf_protection_enabled 0; (comment out the geo/map block in dev)
# This variable gates the CF-Ray check below.  Flip to "1" after CDN is live.
map $http_cf_ray $cf_ray_present {
    default  1;   # CF-Ray header present → allow
    ""       0;   # No CF-Ray → direct origin hit (block in prod)
}
# Override value — 1=enforce CF-Ray, 0=allow all (dev/staging toggle)
map $scheme $enforce_cf {
    default "0";  # Set to "1" after Cloudflare is fully routed
}

# --- Upstream ---
upstream backend {
    server livora-backend:8080;
    keepalive 200;
    keepalive_requests 1000;
    keepalive_timeout  60s;
}

# --- HTTP → HTTPS redirect ---
server {
    listen 80;
    server_name api.joinlivora.com cdn.joinlivora.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# --- HTTPS server ---
server {
    listen 443 ssl http2;
    server_name api.joinlivora.com cdn.joinlivora.com;

    # --- TLS ---
    ssl_certificate /etc/letsencrypt/live/api.joinlivora.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.joinlivora.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305';
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;

    # --- Security headers ---
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff"                             always;
    add_header X-Frame-Options           "DENY"                                always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"     always;

    # --- Origin protection: block direct-to-origin requests when CF is live ---
    # When $enforce_cf = "1" AND no CF-Ray header → 403.
    # When $enforce_cf = "0" (dev) → allow through.
    # Usage: change map above to return "1" after CDN is fully configured.
    set $origin_block 0;
    if ($enforce_cf = "1") {
        set $origin_block 1;
    }
    if ($cf_ray_present = 1) {
        set $origin_block 0;    # Has CF-Ray → clear the block
    }
    if ($origin_block = 1) {
        return 403 "Direct origin access blocked. Route via CDN.";
    }

    # --- Request size limit ---
    client_max_body_size 10m;

    # --- Common proxy headers (propagate real client IP from CF to backend) ---
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $http_cf_connecting_ip;   # real client IP from CF
    proxy_set_header X-Forwarded-For   $http_cf_connecting_ip;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header CF-Ray            $http_cf_ray;             # propagate for logging

    # =========================================================================
    # HLS direct file serving (Nginx reads from volume — zero JVM involvement)
    # =========================================================================
    #
    # CDN CACHING RULES (configure in Cloudflare dashboard):
    #   *.m3u8  → Cache Everything, Edge TTL: 4s,    Browser TTL: 0s
    #   *.ts    → Cache Everything, Edge TTL: 3600s, Browser TTL: 3600s, immutable
    #   /api/hls/token   → Bypass Cache
    #   /api/hls/validate → Bypass Cache
    #
    # TOKEN FLOW (with Cloudflare Worker at edge):
    #   1. Frontend calls /api/hls/token → receives HMAC token (5-min TTL)
    #   2. Appends ?t={token} to every playlist/segment URL
    #   3. Cloudflare Worker validates HMAC at edge — ZERO origin auth calls
    #   4. On token miss / CDN bypass → Nginx auth_request validates at origin
    #
    # ORIGIN SHIELD (Cloudflare Tiered Cache):
    #   Enable "Tiered Cache" in Cloudflare → only ONE origin-shield node makes
    #   cache-miss requests to this Nginx, preventing thundering-herd on stream start.
    #
    # URL pattern : /hls/{streamId}/{file}
    # Volume path : /var/www/hls/{streamId}/{file}   (streams_data Docker volume)
    # =========================================================================

    # -- Playlist files (.m3u8) — short cache, frequent poll --
    location ~ ^/hls/([0-9a-f-]{36})/(.+\.m3u8)$ {
        # Rate limit — generous burst for concurrent CDN origin-shield requests
        limit_req zone=hls burst=50 nodelay;

        # Origin auth fallback (Cloudflare Worker validates at edge; this catches
        # requests that bypass the Worker or arrive during cold-start)
        auth_request /internal/hls-auth;
        auth_request_set $auth_status $upstream_status;
        set $hls_stream_id $1;
        set $hls_token     $arg_t;

        alias /var/www/hls/$1/$2;

        types { }
        default_type application/vnd.apple.mpegurl;

        # CDN: short TTL so live playlists stay fresh.
        # Cloudflare "Cache Everything" rule for *.m3u8 overrides with Edge TTL=4s.
        add_header Cache-Control         "no-cache, no-store, must-revalidate" always;
        add_header Pragma                "no-cache"                            always;
        # Surrogate-Control is read by CDNs but not browsers — allows per-CDN TTL
        add_header Surrogate-Control     "max-age=4"                           always;
        add_header Access-Control-Allow-Origin  "*"                            always;
        add_header Access-Control-Allow-Headers "*"                            always;
        add_header Access-Control-Expose-Headers "Content-Length,Content-Range" always;
        add_header X-Content-Type-Options "nosniff"                            always;
        # ETag for conditional GET support (CDN revalidation)
        etag on;
    }

    # -- Segment files (.ts) — long cache, immutable per unique timestamp filename --
    location ~ ^/hls/([0-9a-f-]{36})/(.+\.ts)$ {
        limit_req zone=hls burst=200 nodelay;

        auth_request /internal/hls-auth;
        auth_request_set $auth_status $upstream_status;
        set $hls_stream_id $1;
        set $hls_token     $arg_t;

        alias /var/www/hls/$1/$2;

        types { }
        default_type video/mp2t;

        # Segments are immutable: timestamp-based filenames prevent cache poisoning.
        # CDN stores for 1 hour; browser stores for 1 hour.
        add_header Cache-Control         "public, max-age=3600, immutable"     always;
        add_header Surrogate-Control     "max-age=3600"                        always;
        add_header Access-Control-Allow-Origin  "*"                            always;
        add_header Access-Control-Allow-Headers "*"                            always;
        add_header Access-Control-Expose-Headers "Content-Length,Content-Range" always;
        add_header X-Content-Type-Options "nosniff"                            always;
        # Last-Modified for CDN conditional revalidation
        add_header Last-Modified         $date_gmt                             always;

        sendfile    on;
        tcp_nopush  on;
        aio         threads;

        open_file_cache          max=10000 inactive=30s;
        open_file_cache_valid    60s;
        open_file_cache_min_uses 2;
        open_file_cache_errors   on;
    }

    # -- Internal auth sub-request endpoint (never exposed to clients) --
    location = /internal/hls-auth {
        internal;
        proxy_pass http://backend/api/hls/validate?streamId=$hls_stream_id&t=$hls_token;
        proxy_pass_request_body off;
        proxy_set_header Content-Length   "";
        proxy_set_header X-Original-URI   $request_uri;
        proxy_set_header X-Real-IP        $http_cf_connecting_ip;
        proxy_set_header X-Forwarded-For  $http_cf_connecting_ip;
        # Fast timeout — pure HMAC, no I/O
        proxy_connect_timeout 2s;
        proxy_read_timeout    2s;
    }

    # =========================================================================
    # WebSocket (STOMP over SockJS)
    # =========================================================================
    location /ws {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $http_cf_connecting_ip;
        proxy_set_header X-Forwarded-For   $http_cf_connecting_ip;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # =========================================================================
    # Auth endpoints (strict rate limit)
    # =========================================================================
    location /api/auth/ {
        limit_req zone=auth burst=10 nodelay;
        proxy_pass http://backend;
    }

    # =========================================================================
    # File upload endpoints
    # =========================================================================
    location /api/creator/profile/upload {
        limit_req zone=upload burst=5 nodelay;
        proxy_pass http://backend;
    }

    # =========================================================================
    # HLS token + validate endpoints
    # /api/hls/token   → authenticated, returns HMAC token
    # /api/hls/validate → Cloudflare Worker / auth_request sub-request
    # /api/hls/**      → Spring fallback (transition period only)
    # =========================================================================
    location /api/hls/ {
        limit_req zone=hls burst=100 nodelay;
        proxy_pass http://backend;
    }

    # =========================================================================
    # General API (rate limited)
    # =========================================================================
    location /api/ {
        limit_req zone=api burst=50 nodelay;
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # =========================================================================
    # Stripe webhooks
    # =========================================================================
    location /webhooks/ {
        proxy_pass http://backend;
    }

    # =========================================================================
    # Health check (Cloudflare Load Balancer health probe — public)
    # =========================================================================
    location /actuator/health {
        proxy_pass http://backend;
        # Allow Cloudflare health checker + monitoring without rate limit
        limit_req_status 429;
    }

    # --- Block all other actuator endpoints ---
    location /actuator/ {
        deny all;
    }
}
