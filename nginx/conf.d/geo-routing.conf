# ============================================================
# Geo-based Routing & Edge Caching Configuration
# ============================================================
# Routes users to the nearest regional backend based on IP geolocation.
# Requires: nginx compiled with ngx_http_geoip2_module or using
# Cloudflare Load Balancer (recommended for production).
#
# This config provides:
# 1. GeoIP-based region detection (via CF-IPCountry header or geoip module)
# 2. Region-aware upstream selection
# 3. Static asset caching for thumbnails/profiles/recordings
# 4. TURN server region hints via response headers
# ============================================================

# ── Region mapping from Cloudflare CF-IPCountry header ──
# When behind Cloudflare, the CF-IPCountry header provides the user's country.
# Map countries to regional backend upstreams.
map $http_cf_ipcountry $user_region {
    default         "eu";

    # North America → US region
    US              "us";
    CA              "us";
    MX              "us";

    # South America → US region (closest)
    BR              "us";
    AR              "us";
    CO              "us";
    CL              "us";
    PE              "us";

    # Europe → EU region
    GB              "eu";
    DE              "eu";
    FR              "eu";
    NL              "eu";
    ES              "eu";
    IT              "eu";
    PL              "eu";
    SE              "eu";
    NO              "eu";
    DK              "eu";
    FI              "eu";
    BE              "eu";
    AT              "eu";
    CH              "eu";
    IE              "eu";
    PT              "eu";
    CZ              "eu";
    RO              "eu";
    HU              "eu";
    GR              "eu";
    BG              "eu";
    HR              "eu";
    SK              "eu";
    LT              "eu";
    LV              "eu";
    EE              "eu";
    SI              "eu";

    # Middle East / Africa → EU region (closest)
    TR              "eu";
    IL              "eu";
    AE              "eu";
    SA              "eu";
    ZA              "eu";
    EG              "eu";
    NG              "eu";
    KE              "eu";

    # Asia-Pacific → EU for now (future: asia region)
    # JP           "asia";
    # KR           "asia";
    # AU           "asia";
    # IN           "asia";
    # SG           "asia";

    # Fallback for unknown or missing header
    ""              "eu";
}

# ── Regional Backend Upstreams ──
# Each region has its own backend cluster.
# In single-region mode, both point to the same backend.
upstream backend_eu {
    server ${BACKEND_EU_HOST:-livora-backend}:8080;
    keepalive 32;
}

upstream backend_us {
    server ${BACKEND_US_HOST:-livora-backend}:8080;
    keepalive 32;
}

# ── Dynamic upstream selection based on region ──
map $user_region $regional_backend {
    "eu"    "backend_eu";
    "us"    "backend_us";
    default "backend_eu";
}

# ── Regional TURN server mapping ──
map $user_region $regional_turn {
    "eu"    "turn:turn-eu.joinlivora.com:3478";
    "us"    "turn:turn-us.joinlivora.com:3478";
    default "turn:turn-eu.joinlivora.com:3478";
}

map $user_region $regional_turn_fallback {
    "eu"    "turn:turn-us.joinlivora.com:3478";
    "us"    "turn:turn-eu.joinlivora.com:3478";
    default "turn:turn-us.joinlivora.com:3478";
}

# ── Static Asset Cache Settings ──
# Cache thumbnails, profile images, and recordings at the edge.
proxy_cache_path /var/cache/nginx/static levels=1:2
    keys_zone=static_cache:10m
    max_size=1g
    inactive=24h
    use_temp_path=off;

