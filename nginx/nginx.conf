worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 8192;
    multi_accept on;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;
    server_tokens off;

    include /etc/nginx/conf.d/*.conf;
}

rtmp {
    server {
        listen 1935;
        chunk_size 4000;

        application live {
            live on;
            record all;
            record_path /var/www/recordings;
            record_unique on;
            record_suffix _%Y%m%d_%H%M%S.flv;

            # Enable HLS for this application to keep recordings as HLS
            hls on;
            hls_path /var/www/recordings/hls;
            hls_nested on;
            hls_fragment 3;
            hls_playlist_length 0; # Keep all segments for VOD
            hls_cleanup off; # Don't delete segments

            # Transcode to multiple variants
            exec_ffmpeg -i rtmp://127.0.0.1/live/$name
              -c:a copy -c:v libx264 -preset veryfast -b:v 4500k -maxrate 4500k -bufsize 9000k -s 1920x1080 -f flv rtmp://127.0.0.1/show/$name_1080p
              -c:a copy -c:v libx264 -preset veryfast -b:v 2500k -maxrate 2500k -bufsize 5000k -s 1280x720  -f flv rtmp://127.0.0.1/show/$name_720p
              -c:a copy -c:v libx264 -preset veryfast -b:v 1000k -maxrate 1000k -bufsize 2000k -s 854x480   -f flv rtmp://127.0.0.1/show/$name_480p;

            # Generate thumbnails for discovery
            exec_ffmpeg -i rtmp://127.0.0.1/live/$name
              -vf fps=1 \
              -update 1 \
              -y /var/www/uploads/thumbnails/$name.jpg;

            # Authentication callbacks
            on_publish http://livora-backend:8080/api/stream/auth;
            on_publish_done http://livora-backend:8080/api/stream/auth-done;
            on_record_done http://livora-backend:8080/api/stream/record-done;

            # Allow publishing from anywhere for now, but in production we should secure this
            allow publish all;
            # Allow playing from anywhere
            allow play all;
        }

        application show {
            live on;
            record off;

            hls on;
            hls_path /var/www/hls;
            hls_nested on;

            hls_variant _1080p BANDWIDTH=4500000,RESOLUTION=1920x1080;
            hls_variant _720p  BANDWIDTH=2500000,RESOLUTION=1280x720;
            hls_variant _480p  BANDWIDTH=1000000,RESOLUTION=854x480;

            hls_fragment 3;
            hls_playlist_length 60;
        }
    }
}
