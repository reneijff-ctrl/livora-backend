worker_processes auto;
worker_rlimit_nofile 65535;
events {
    worker_connections 8192;
    multi_accept on;
}
http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;
    server_tokens off;
    include /etc/nginx/conf.d/*.conf;
}
rtmp {
    server {
        listen 1935;
        chunk_size 4000;

        # ── RTMP ingest only ──
        # All FFmpeg transcoding has been removed from Nginx.
        # The external transcode-worker service polls stream:transcode:jobs
        # from Redis and runs GPU-accelerated FFmpeg (h264_nvenc) per stream,
        # writing multi-bitrate HLS output to /streams/{streamId}/.
        application live {
            live on;
            record off;

            # Authentication callbacks — backend validates the stream key
            on_publish http://livora-backend:8080/api/stream/auth;
            on_publish_done http://livora-backend:8080/api/stream/auth-done;

            allow publish all;
            allow play all;
        }
    }
}
