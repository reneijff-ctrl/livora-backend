services:
  # Restore the backend's public port for local development.
  # In production docker-compose.yml the port binding is intentionally removed
  # (origin protection — all traffic via Nginx).
  livora-backend:
    ports:
      - "8080:8080"

  postgres:
    image: postgres:16-alpine
    container_name: livora-postgres
    restart: always
    environment:
      POSTGRES_DB: joinlivora
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: livora-redis
    restart: always
    ports:
      - "6379:6379"
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: livora-rabbitmq
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
      - "61613:61613"
      - "15674:15674"
    environment:
      RABBITMQ_DEFAULT_USER: livora
      RABBITMQ_DEFAULT_PASS: livora
    command: >
      bash -c "
      rabbitmq-plugins enable --offline rabbitmq_stomp &&
      rabbitmq-plugins enable --offline rabbitmq_web_stomp &&
      rabbitmq-server
      "

volumes:
  postgres_data: