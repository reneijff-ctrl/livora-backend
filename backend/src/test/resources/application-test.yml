spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  cache:
    type: none
  flyway:
    enabled: false

stripe:
  api:
    key: sk_test_mock_key
  webhook:
    secret: whsec_mock_secret
  premium-plan-id: price_mock
  success-url: http://localhost:3000/payment/success
  cancel-url: http://localhost:3000/payment/cancel

security:
  jwt:
    secret: test_secret_test_secret_test_secret_test_secret_test_secret_test_secret
    expiration: 3600
    refresh-token-expiration: 604800

livora:
  monetization:
    platform-fee-percentage: 30
  security:
    cors:
      allowed-origins: http://localhost:3000,https://joinlivora.com
    rate-limit:
      anonymous: 100
      authenticated: 100
      creator: 100
      admin: 100
      websocket: 100
      login: 100
      register: 100

management:
  health:
    mail:
      enabled: false
    stripe:
      enabled: false
    redis:
      enabled: false
