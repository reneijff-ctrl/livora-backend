file:
  upload-dir: uploads

spring:
  data:
    redis:
      host: 127.0.0.1
      port: 6379
  cache:
    type: none
  datasource:
    url: jdbc:postgresql://localhost:5432/joinlivora
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        temp:
          use_jdbc_metadata_defaults: false
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false
    hibernate.validator.apply_to_ddl: false
    hibernate.validator.autoregister_listeners: false
    hibernate.type.uuid_binary: true
    hibernate.temp.use_jdbc_metadata_defaults: false
    hibernate.schema_validation_enabled: false
  # Flyway repair is enabled via FlywayConfig.java for the 'dev' profile
  # to automatically fix checksum mismatches after manual migration edits.
  flyway:
    enabled: true
    baseline-on-migrate: true
    clean-disabled: false

security:
  cookie:
    secure: false

management:
  health:
    mail:
      enabled: false
    stripe:
      enabled: true
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
  endpoint:
    health:
      show-details: always
      show-components: always
      probes:
        enabled: true

stripe:
  api:
    key: sk_test_51SweUZFPvuqGTnFGyQr15MgSnKu1Bq1t8mJrNMw7J239aaAanEP1FABhEFE25luP9w01JFsuOyxF7JL1luAyLJhF00kHHRrDly
  webhook:
    secret: whsec_31098ea02bcf7b0e5b045f3d635c16563a3582dad7f8b0866dd257917819bff2

logging:
  level:
    org.springframework.security: WARN
    org.hibernate.SQL: OFF
    com.joinlivora: INFO

livora:
  trust:
    evaluation:
      enabled: false
  security:
    csrf:
      enabled: false
    rate-limit:
      anonymous: 1000
      authenticated: 5000
      creator: 10000
      admin: 100000
      websocket: 100000
      login: 100
      register: 100
    max-sessions-per-ip: 100
    max-global-sessions: 10000
    max-handshake-per-minute: 200
    max-joins-per-window: 1000
    join-window-ms: 5000

payments:
  stripe:
    enabled: true
