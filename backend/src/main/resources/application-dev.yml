spring:
  data:
    redis:
      host: localhost
      port: 6379
  cache:
    type: none
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/joinlivora}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        temp:
          use_jdbc_metadata_defaults: false
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false
    hibernate.validator.apply_to_ddl: false
    hibernate.validator.autoregister_listeners: false
    hibernate.type.uuid_binary: true
    hibernate.temp.use_jdbc_metadata_defaults: false
    hibernate.schema_validation_enabled: false
  # Flyway repair is enabled via FlywayConfig.java for the 'dev' profile
  # to automatically fix checksum mismatches after manual migration edits.
  flyway:
    enabled: true
    clean-disabled: false

security:
  cookie:
    secure: false

management:
  health:
    mail:
      enabled: false
    stripe:
      enabled: false
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
  endpoint:
    health:
      show-details: always

stripe:
  api:
    key: sk_test_XXXXXXXXXXXXXXXX
  webhook:
    secret: whsec_XXXXXXXXXXXXXXXX

logging:
  level:
    org.springframework.security: WARN
    org.hibernate.SQL: OFF
    com.joinlivora: INFO

livora:
  security:
    rate-limit:
      anonymous: 1000
      authenticated: 5000
      creator: 10000
      admin: 100000
      websocket: 100000
      login: 100
      register: 100

payments:
  stripe:
    enabled: false
