spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc.batch_size: 25
        order_inserts: true
        order_updates: true
  data:
    redis:
      host: ${REDIS_HOST:livora-redis}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD}
  rabbitmq:
    host: ${RABBITMQ_HOST:livora-rabbitmq}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:livora}
    password: ${RABBITMQ_PASS:livora}
  cache:
    type: redis
    redis:
      time-to-live: 300000
  flyway:
    enabled: true
    clean-disabled: true
  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8080
  address: 0.0.0.0
  forward-headers-strategy: native
  error:
    include-stacktrace: never
    include-message: never
  tomcat:
    remoteip:
      remote-ip-header: x-forwarded-for
      protocol-header: x-forwarded-proto
    threads:
      max: 200
      min-spare: 20
    max-connections: 10000
    accept-count: 200
    connection-timeout: 5000

security:
  jwt:
    secret: ${JWT_SECRET}
  cookie:
    secure: true

livora:
  websocket:
    broker:
      host: ${STOMP_BROKER_HOST:livora-rabbitmq}
      port: ${STOMP_BROKER_PORT:61613}

management:
  endpoints:
    web:
      exposure:
        include: "health,info,prometheus"
  endpoint:
    health:
      show-details: when_authorized
    info:
      enabled: true
  prometheus:
    metrics:
      export:
        enabled: true
  metrics:
    tags:
      application: livora-backend
