spring:
  flyway:
    enabled: true
    clean-disabled: false
  datasource:
    url: jdbc:postgresql://livora-postgres:5432/joinlivora
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc.batch_size: 25
        order_inserts: true
        order_updates: true
  data:
    redis:
      host: livora-redis
      port: ${REDIS_PORT:6379}
livora:
  websocket:
    broker:
      host: ${STOMP_BROKER_HOST:livora-rabbitmq}
server:
  port: 8080
  address: 0.0.0.0
  forward-headers-strategy: native
  tomcat:
    remoteip:
      remote-ip-header: x-forwarded-for
      protocol-header: x-forwarded-proto

security:
  jwt:
    secret: ${JWT_SECRET}
  cookie:
    secure: true

management:
  endpoints:
    web:
      exposure:
        include: "health,info"
  endpoint:
    health:
      show-details: when_authorized
    info:
      enabled: true
