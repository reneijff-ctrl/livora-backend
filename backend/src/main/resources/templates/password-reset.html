<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Password Reset Request</title>
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; }
        .header { background: #6772e5; color: white; padding: 10px; text-align: center; border-radius: 5px 5px 0 0; }
        .content { border: 1px solid #ddd; padding: 20px; border-top: none; }
        .footer { font-size: 0.8em; text-align: center; margin-top: 20px; color: #777; }
        .button { display: inline-block; padding: 10px 20px; background-color: #6772e5; color: white; text-decoration: none; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Password Reset</h1>
        </div>
        <div class="content">
            <p>Hi <span th:text="${user.email}">user@example.com</span>,</p>
            <p>We received a request to reset your password. Click the button below to choose a new password:</p>
            <p style="text-align: center;">
                <a th:href="${resetUrl}" class="button">Reset Password</a>
            </p>
            <p>If you didn't request this, you can safely ignore this email.</p>
            <p>Cheers,<br>The Livora Team</p>
        </div>
        <div class="footer">
            &copy; 2026 Livora Platform. All rights reserved.
        </div>
    </div>
</body>
</html>
