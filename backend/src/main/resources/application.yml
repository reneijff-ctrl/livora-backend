spring:
  application:
    name: joinlivora-backend
  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:livora}
    password: ${SPRING_RABBITMQ_PASSWORD:livora}
  profiles:
    active: dev
  mvc:
    pathmatch:
      matching-strategy: path_pattern_parser
  
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      # Tightened for circuit-breaker compatibility: 3 s timeout so DB failures
      # are detected quickly rather than blocking threads for 30 s each.
      connection-timeout: 3000
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 600000
      max-lifetime: 1800000
      auto-commit: false
      initialization-fail-timeout: 1 # Fail fast if DB unreachable
      # Leak detection: warn if a connection is held for >10 s (slow query guard)
      leak-detection-threshold: 10000

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true
        connection:
          provider_disables_autocommit: true

  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      # Chaos hardening: bound Redis failure detection to 2 s
      timeout: 2000ms
      connect-timeout: 1000ms
      repositories:
        enabled: true

  cache:
    type: redis

  lifecycle:
    timeout-per-shutdown-phase: 30s

  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

logging:
  level:
    root: INFO
    com.joinlivora: INFO
    org.springframework.security: INFO
    org.springframework.data.repository.config.RepositoryConfigurationDelegate: WARN
    org.springframework.data.redis.repository.configuration.RedisRepositoryConfigurationExtension: WARN

server:
  port: 8080
  shutdown: graceful
  error:
    include-stacktrace: never
    include-message: always
  tomcat:
    max-swallow-size: -1
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    prometheus:
      enabled: true
  metrics:
    tags:
      application: livora-backend
    distribution:
      percentiles-histogram:
        http.server.requests: true
  otlp:
    metrics:
      export:
        enabled: false

hls:
  # Root directory where the transcode-worker writes HLS output.
  # Must match the streams_data volume mount inside the container (/var/www/hls).
  directory: ${HLS_DIRECTORY:/var/www/hls}
  # Directory where completed stream recordings are stored (VOD fallback).
  recordings-directory: ${HLS_RECORDINGS_DIRECTORY:/var/www/recordings/hls}
  token:
    # HMAC secret used to sign and verify short-lived HLS access tokens.
    # Defaults to the JWT secret so no extra env var is needed at first deploy.
    # Set HLS_TOKEN_SECRET to an independent value in production for isolation.
    secret: ${HLS_TOKEN_SECRET:${JWT_SECRET}}
    # Token validity in seconds (default 5 minutes — covers one playlist poll cycle
    # plus buffering time; clients should refresh before expiry).
    ttl-seconds: ${HLS_TOKEN_TTL_SECONDS:300}

security:
  jwt:
    secret: ${JWT_SECRET}
    expiration: 3600
    refresh-token-expiration: 604800

stripe:
  api:
    key: ${STRIPE_SECRET_KEY}
  webhook:
    secret: ${STRIPE_WEBHOOK_SECRET}
  premium-plan-id: ${STRIPE_PREMIUM_PLAN_ID:price_12345}
  success-url: ${FRONTEND_SUCCESS_URL:${FRONTEND_URL:http://localhost:3000}/payment/success}
  cancel-url: ${FRONTEND_CANCEL_URL:${FRONTEND_URL:http://localhost:3000}/payment/cancel}
  token-success-url: ${FRONTEND_TOKEN_SUCCESS_URL:${FRONTEND_URL:http://localhost:3000}/tokens/success}
  token-cancel-url: ${FRONTEND_TOKEN_CANCEL_URL:${FRONTEND_URL:http://localhost:3000}/tokens/cancel}

mediasoup:
  base-url: ${MEDIASOUP_BASE_URL:http://localhost:4000}
  auth-token: ${MEDIASOUP_AUTH_TOKEN:default_mediasoup_secret}
  nodes: ${MEDIASOUP_NODES:}
  heartbeat-interval: ${MEDIASOUP_HEARTBEAT_INTERVAL:5000}
  failure-threshold-ms: ${MEDIASOUP_FAILURE_THRESHOLD_MS:10000}
  max-viewers-per-stream: ${MEDIASOUP_MAX_VIEWERS_PER_STREAM:500}
  autoscale-interval: ${MEDIASOUP_AUTOSCALE_INTERVAL:30000}
  local-region: ${MEDIASOUP_LOCAL_REGION:eu}
  timeout:
    connect: 3000
    read: 5000

file:
  upload-dir: ${UPLOAD_DIR:uploads}

livora:
  base-url: ${BASE_URL:http://localhost:8080}
  messaging:
    redis-pubsub-enabled: ${REDIS_PUBSUB_ENABLED:false}
  nginx:
    rtmp:
      host: ${NGINX_RTMP_HOST:nginx}
      port: ${NGINX_RTMP_PORT:1935}
      app: ${NGINX_RTMP_APP:live}
  tipping:
    min-tokens: 1
    max-per-minute: 5
  supertips:
    max-per-minute: 2
    room-cooldown-seconds: 10
    slow-mode-bypass-seconds: 300
  highlights:
    max-per-minute: 5
  monetization:
    platform-fee-percentage: 30
    earnings-dry-run: ${EARNINGS_DRY_RUN:false}
  chat:
    slow-mode-interval-seconds: 3
    moderation:
      banned-words:
        - scam
        - phishing
        - hack
        - giveaway
        - free tokens
        - porn
        - nsfw
      caps-threshold: 0.7
      repeated-chars-threshold: 6
      duplicate-window-seconds: 30
      duplicate-threshold: 3
      toxic-keywords:
        - badword1
        - badword2
      toxic-patterns:
        - ".*f[u*][c*]k.*"
    sentiment:
      positive-keywords:
        - love
        - happy
        - great
        - awesome
        - good
        - best
        - cool
        - nice
        - thanks
        - thank
        - wonderful
      negative-keywords:
        - hate
        - sad
        - bad
        - worst
        - awful
        - terrible
        - horrible
        - angry
        - dislike
        - no
        - stop
  security:
    enforce-https: ${ENFORCE_HTTPS:false}
    csrf:
      enabled: true
    cors:
      allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://127.0.0.1:3000,http://127.0.0.1:5173,https://joinlivora.com}
    trusted-proxies: ${TRUSTED_PROXIES:127.0.0.1,::1}
    rate-limit:
      anonymous: 30
      authenticated: 200
      creator: 1000
      admin: 5000
      websocket: 10000
      login: 5
      register: 3
    max-sessions-per-ip: ${WEBSOCKET_MAX_SESSIONS_PER_IP:10}
    max-global-sessions: ${WEBSOCKET_MAX_GLOBAL_SESSIONS:5000}
    max-handshake-per-minute: ${WEBSOCKET_MAX_HANDSHAKE_PER_MINUTE:20}
    max-joins-per-window: ${WEBSOCKET_MAX_JOINS_PER_WINDOW:100}
    join-window-ms: ${WEBSOCKET_JOIN_WINDOW_MS:5000}
  payout:
    hold-rules:
      none:
        risk-score: 20
        chargeback-rate: 0.5
        days: 0
      short-hold:
        risk-score: 40
        chargeback-rate: 0.5
        days: 3
      medium-hold:
        risk-score: 60
        chargeback-rate: 0.5
        days: 7
      long-hold:
        risk-score: 100
        chargeback-rate: 1.0
        days: 14
    unlock-check-interval-ms: 600000
  websocket:
    broker:
      host: ${STOMP_BROKER_HOST:localhost}
      port: ${STOMP_BROKER_PORT:61613}
      username: ${STOMP_BROKER_USERNAME:livora}
      password: ${STOMP_BROKER_PASSWORD:livora}
  fraud:
    velocity:
      login:
        1m:
          limit: 5
          action: suspicious
      tip:
        1m:
          limit: 10
          action: suspicious
        10m:
          limit: 50
          action: critical
      payment:
        5m:
          limit: 3
          action: critical
      message:
        1m:
          limit: 30
          action: spam

---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    hikari:
      maximum-pool-size: 50
      minimum-idle: 10
  jpa:
    show-sql: false
  sql:
    init:
      mode: never
  h2:
    console:
      enabled: false

logging:
  level:
    root: WARN
    com.joinlivora: INFO
    org.springframework: WARN
livora:
  security:
    enforce-https: true
    cors:
      allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,https://joinlivora.com}
  stripe:
    webhook:
      secret: ${STRIPE_WEBHOOK_SECRET}
  springdoc:
    api-docs:
      enabled: false
    swagger-ui:
      enabled: false

  # ── Ultra-scale streaming config ──────────────────────────────────────────
  streaming:
    # Number of Redis shards per stream (power of 2). 16 shards support ~1M viewers.
    shard-count: ${STREAM_SHARD_COUNT:16}

  # ── Chat partitioning ─────────────────────────────────────────────────────
  chat:
    # Number of Redis Pub/Sub partitions per stream chat. 16 × 50k msg/s = 800k msg/s ceiling.
    partition-count: ${CHAT_PARTITION_COUNT:16}
    # Enable partitioned chat (off by default for gradual rollout)
    partitioned-enabled: ${CHAT_PARTITIONED_ENABLED:false}

  # ── CDN / HLS pre-warm ────────────────────────────────────────────────────
  cdn:
    base-url: ${CDN_BASE_URL:https://cdn.joinlivora.com}
    prewarm-enabled: ${CDN_PREWARM_ENABLED:true}
    prewarm-segments: ${CDN_PREWARM_SEGMENTS:3}

  # ── Load shedding thresholds ──────────────────────────────────────────────
  # Tier 0 (soft cap)    : warn in logs only
  # Tier 1 (quality cap) : remove 720p from master playlist
  # Tier 2 (webrtc cap)  : deny new WebRTC consumers (force HLS-only)
  # Tier 3 (hard cap)    : reject all new viewer join attempts (503)
  shedding:
    enabled: ${SHEDDING_ENABLED:true}
    soft-cap: ${SHEDDING_SOFT_CAP:50000}
    quality-cap: ${SHEDDING_QUALITY_CAP:100000}
    webrtc-cap: ${SHEDDING_WEBRTC_CAP:200000}
    hard-cap: ${SHEDDING_HARD_CAP:500000}

  # ── Redis Streams analytics ────────────────────────────────────────────────
  analytics:
    enabled: ${ANALYTICS_ENABLED:true}
    viewer-stream-maxlen: ${ANALYTICS_VIEWER_MAXLEN:100000}
    segment-stream-maxlen: ${ANALYTICS_SEGMENT_MAXLEN:500000}

hls:
  directory: ${HLS_DIRECTORY:/var/www/hls}
  recordings-directory: ${HLS_RECORDINGS_DIRECTORY:/var/www/recordings}
  token:
    secret: ${HLS_TOKEN_SECRET:${JWT_SECRET}}
    ttl-seconds: ${HLS_TOKEN_TTL_SECONDS:180}
    # Set true to enable IP-bound anti-leech tokens (gradual rollout)
    ip-binding-enabled: ${HLS_TOKEN_IP_BINDING:false}
