global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "/etc/prometheus/alerts/*.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - "alertmanager:9093"

scrape_configs:
  # ── Mediasoup SFU Nodes ──
  - job_name: "mediasoup"
    scrape_interval: 5s
    metrics_path: /metrics
    static_configs:
      - targets:
          - "mediasoup-1:4000"
          - "mediasoup-2:4001"
          - "mediasoup-3:4002"
        labels:
          service: "mediasoup"

  # ── Spring Boot Backend (Actuator) ──
  - job_name: "spring-boot"
    scrape_interval: 15s
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - "livora-backend:8080"
        labels:
          service: "backend"

  # ── Redis ──
  - job_name: "redis"
    scrape_interval: 15s
    static_configs:
      - targets:
          - "redis-exporter:9121"
        labels:
          service: "redis"

  # ── RabbitMQ ──
  - job_name: "rabbitmq"
    scrape_interval: 15s
    static_configs:
      - targets:
          - "livora-rabbitmq:15692"
        labels:
          service: "rabbitmq"

  # ── Prometheus self-monitoring ──
  - job_name: "prometheus"
    static_configs:
      - targets:
          - "localhost:9090"
